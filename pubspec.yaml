name: student_academic_assistant
description: "Student Academic Assistant - Flutter MVVM"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

  # Serialization annotations (required by json_serializable/freezed)
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_storage: ^12.1.2
  cloud_functions: ^5.0.3
  google_sign_in: ^6.2.1

  # AI / Generative AI
  google_generative_ai: ^0.4.5

  # OCR
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # ASR (Speech to Text)
  speech_to_text: ^7.3.0

  # Notifications & Alarm
  flutter_local_notifications: ^17.2.3
  alarm: ^4.0.2
  timezone: ^0.9.4

  # Offline Storage (Isar)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # UI / UX / Charts
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flex_color_scheme: ^8.0.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  share_plus: ^10.0.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.3.9
  json_serializable: ^6.8.0
  freezed: ^2.4.7
  isar_generator: ^3.1.0+1

dependency_overrides:
  js: ^0.6.7


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
